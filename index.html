<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a1a4f">
<title>Yosemite Quest</title>
<link rel="icon" type="image/png" href="yosemite-quest-icon-180.png">
<link rel="apple-touch-icon" href="yosemite-quest-icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
/* ===== 18bit 冒険色 / ドラクエ風 レトロUI ===== */
:root{
  --win:#0a1a4f; --win2:#122a6e; --ink:#ffffff; --gold:#ffd23f;
  --granite:#7d8491; --pine:#1f6f4a; --sky1:#2b6cb0; --sky2:#7fb2e6; --sun:#ffcf6b;
  --ok:#3ddc84; --ng:#ff5a5a; --shadow:#04102e;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{font-family:"DotGothic16","Meiryo UI","Hiragino Kaku Gothic ProN",monospace;background:#04102e;color:var(--ink);overflow-x:hidden;-webkit-user-select:none;user-select:none;letter-spacing:.5px;}
/* ===== 背景：ドット絵（昼/夜）を全画面。画像が無い間はグラデにフォールバック ===== */
#bg{position:fixed;inset:0;z-index:-1;overflow:hidden;background-color:#0a1230;
  background-image:url('yosemite-day-720x1280.webp'), linear-gradient(180deg,var(--sky1),var(--sky2) 55%,#cfe6c8);
  background-size:cover;background-position:center top;background-repeat:no-repeat;
  image-rendering:pixelated;image-rendering:crisp-edges;}
body.night #bg{background-image:url('yosemite-night-720x1280.webp'), linear-gradient(180deg,#0a1030,#1a2452 60%,#243a5e);}
/* 上下スクリム：明るい昼背景でも文字を読みやすく（中央のドット絵は活かす） */
.scrim{position:absolute;inset:0;pointer-events:none;background:
  linear-gradient(180deg, rgba(4,16,46,.48) 0%, rgba(4,16,46,0) 20%, rgba(4,16,46,0) 56%, rgba(4,16,46,.66) 100%);}
.stars{position:absolute;inset:0;opacity:0;}  /* 夜の星は背景画像側に含む（JS互換のため要素は残す） */

#app{position:relative;max-width:560px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;padding:14px 12px 26px;}
.screen{display:none;animation:fade .25s ease;}
.screen.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.win{background:var(--win);border:4px solid var(--ink);border-radius:10px;box-shadow:0 0 0 4px var(--shadow),0 8px 0 0 var(--shadow);padding:16px;margin:12px 0;}
.win.gold{border-color:var(--gold);}
h1.title{text-align:center;font-size:30px;line-height:1.25;margin:22px 0 4px;color:var(--gold);text-shadow:3px 3px 0 var(--shadow),0 0 10px rgba(255,210,63,.4);letter-spacing:1px;}
.subtitle{text-align:center;color:#e7edff;font-size:13px;margin:0 0 4px;letter-spacing:1px;}

.cmd{display:block;width:100%;text-align:left;background:var(--win2);color:var(--ink);border:3px solid var(--ink);border-radius:8px;font:inherit;font-size:19px;font-weight:bold;padding:14px 14px 14px 40px;margin:10px 0;position:relative;cursor:pointer;transition:transform .05s;}
.cmd:before{content:"▶";position:absolute;left:14px;color:var(--gold);opacity:0;}
.cmd:active{transform:translateY(2px);}
.cmd:hover:before,.cmd:focus:before{opacity:1;}
.cmd.small{font-size:15px;}

/* 名前ボタン（2列） */
.names{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;}
.namebtn{background:var(--win2);color:var(--gold);border:3px solid var(--gold);border-radius:8px;font:inherit;font-size:20px;font-weight:bold;padding:16px 8px;cursor:pointer;transition:transform .05s;}
.namebtn:active{transform:translateY(2px);background:#1c3a86;}

.choices{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
.choice{background:var(--win2);color:var(--ink);border:3px solid var(--ink);border-radius:8px;font:inherit;font-size:18px;font-weight:bold;padding:14px 12px;text-align:left;cursor:pointer;position:relative;transition:transform .05s;}
.choice:active{transform:translateY(2px);}
.choice.correct{background:#0f5a34;border-color:var(--ok);}
.choice.wrong{background:#5a1010;border-color:var(--ng);}
.choice .mk{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:26px;}

.qcat{display:inline-block;font-size:12px;font-weight:bold;color:#04102e;background:var(--gold);border-radius:6px;padding:3px 12px;margin:0 0 6px;letter-spacing:2px;border:2px solid #04102e;}
.qcat.geo{background:#b8c0cc;} .qcat.spot{background:#7fb2e6;} .qcat.hist{background:#ffd23f;} .qcat.nat{background:#5fc98a;}
.qsentence{font-size:21px;line-height:1.65;color:#eef3ff;margin:6px 2px 2px;}
.qsentence u.tgt{text-decoration:none;color:var(--gold);font-weight:bold;border-bottom:4px solid var(--gold);padding:0 2px;text-shadow:0 0 8px rgba(255,210,63,.5);}
.qkana{color:#9db4ff;font-size:14px;margin:8px 2px 0;letter-spacing:1px;}
.speak{background:none;border:none;color:var(--gold);font-size:20px;cursor:pointer;vertical-align:middle;padding:0 6px;}

#bgmBtn{position:fixed;top:8px;right:8px;z-index:50;width:48px;height:48px;padding:0;border:none;background:none;cursor:pointer;}
#bgmBtn img{width:100%;height:100%;image-rendering:pixelated;display:block;}
#bgmBtn.off img{filter:grayscale(1);opacity:.45;}
#bgmBtn:active{transform:translateY(1px);}
/* ホーム：画像タイトル＋画像ボタン */
.titleImg{display:block;width:min(90%,430px);margin:20px auto 10px;image-rendering:pixelated;filter:drop-shadow(3px 4px 0 rgba(4,16,46,.55));}
.homeBtns{display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:8px;}
.imgbtn{background:none;border:none;padding:0;cursor:pointer;width:min(94%,460px);transition:transform .05s;}
.imgbtn img{display:block;width:100%;image-rendering:pixelated;filter:drop-shadow(2px 3px 0 rgba(4,16,46,.5));}
.imgbtn:active{transform:translateY(2px);}
/* アーケード風 名前入力 */
#nameEntry{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;background:rgba(4,16,46,.72);padding:20px;}
#nameEntry.show{display:flex;}
#nameEntry .box{background:var(--win);border:4px solid var(--gold);border-radius:12px;box-shadow:0 0 0 4px var(--shadow),0 10px 0 var(--shadow);padding:20px 18px;max-width:360px;width:100%;text-align:center;}
#nameEntry h3{color:var(--gold);margin:2px 0 4px;font-size:20px;text-shadow:2px 2px 0 var(--shadow);}
#nameEntry p{color:#cfe0ff;font-size:13px;margin:2px 0 12px;}
#nameInput{width:100%;box-sizing:border-box;font:inherit;font-size:24px;text-align:center;letter-spacing:6px;color:var(--gold);background:#04102e;border:3px solid var(--ink);border-radius:8px;padding:12px 8px;text-transform:uppercase;}
#nameEntry .ok{margin-top:14px;}
.hud{display:flex;justify-content:space-between;align-items:center;font-size:14px;color:#eaf1ff;padding:2px 4px;text-shadow:1px 1px 2px #04102e,0 0 4px rgba(4,16,46,.8);}
.hud b{color:var(--gold);}
.bar{height:12px;background:#04102e;border:2px solid var(--ink);border-radius:6px;overflow:hidden;margin:6px 0 2px;}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#ff9d3f);width:0;transition:width .3s;}

#judge{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:40;pointer-events:none;}
#judge.show{display:flex;}
#judge .sym{font-size:170px;font-weight:bold;}
#judge .sym.ok{color:var(--ok);text-shadow:0 0 24px rgba(61,220,132,.8),4px 4px 0 var(--shadow);animation:pop .4s ease;}
#judge .sym.ng{color:var(--ng);text-shadow:0 0 24px rgba(255,90,90,.8),4px 4px 0 var(--shadow);animation:pop .4s ease;}
@keyframes pop{0%{transform:scale(.2);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}

.explain{margin-top:12px;font-size:15px;line-height:1.6;color:#e9eeff;}
.explain .m{color:var(--gold);font-weight:bold;font-size:18px;}
.explain .note{color:#a9c0ff;font-size:13px;margin-top:6px;}

.big{font-size:44px;color:var(--gold);text-shadow:3px 3px 0 var(--shadow);text-align:center;margin:6px 0;}
.rankTitle{text-align:center;font-size:24px;color:#fff;margin:4px 0 2px;line-height:1.3;}
.rankTitle small{display:block;color:var(--gold);font-size:14px;margin-top:4px;}
.stat{display:flex;justify-content:space-between;padding:6px 2px;border-bottom:1px dashed #33468f;font-size:16px;}
.stat b{color:var(--gold);}

.rankrow{display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid #26397f;font-size:15px;}
.rankrow .no{width:34px;text-align:center;font-size:18px;color:var(--gold);font-weight:bold;}
.rankrow .nm{font-weight:bold;}
.rankrow .sc{color:#ffe08a;font-weight:bold;}
.rankrow .tt{font-size:11px;color:#9db4ff;}
.rankrow.me{background:#122a6e;border-radius:6px;}
.rankrow .tt .rdate{color:#7e93d0;font-size:10px;}
.rtabs{display:flex;gap:6px;margin:8px 0 4px;}
.rtab{flex:1;background:var(--win2);color:#cfe0ff;border:2px solid var(--ink);border-radius:7px;font:inherit;font-size:13px;font-weight:bold;padding:8px 4px;cursor:pointer;}
.rtab.on{background:var(--gold);color:#04102e;border-color:#04102e;}
.rtab:active{transform:translateY(1px);}
.notice{font-size:12px;color:#9db4ff;text-align:center;margin:8px 0;}
.online{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--ng);margin-right:5px;vertical-align:middle;}
.online.on{background:var(--ok);}
.trivia-card{border-bottom:1px solid #26397f;padding:10px 2px;font-size:15px;line-height:1.6;}
.trivia-card b{color:var(--gold);}
.ladder{margin-top:2px;}
.lrow{display:flex;align-items:center;gap:8px;font-size:12px;color:#9db4ff;padding:4px 4px;border-bottom:1px dashed #26397f;}
.lrow .lno{width:22px;text-align:center;color:#6f86c8;font-weight:bold;}
.lrow .lnm{flex:1;}
.lrow .lsc{color:#7e93d0;}
.lrow.on{background:#122a6e;color:#fff;border-radius:6px;border-bottom-color:transparent;}
.lrow.on .lno,.lrow.on .lsc{color:var(--gold);}
.lrow.locked .lnm{color:#5f77c0;letter-spacing:4px;}  /* 未到達の称号は伏せ字 */
.lrow.on .lnm:after{content:" ◀ いまここ";color:var(--gold);font-size:11px;}

.center{text-align:center;}
.small{font-size:12px;color:#9db4ff;}
.footer{text-align:center;font-size:11px;color:#5f77c0;margin-top:14px;}
</style>
</head>
<body>
<div id="bg"><div class="scrim"></div><div class="stars" id="stars"></div></div>
<div id="judge"><div class="sym" id="judgeSym"></div></div>
<div id="nameEntry"><div class="box">
  <h3>★ ランキング入り！ ★</h3>
  <p>なまえを いれて とうろく（英字A-Z・10文字まで）</p>
  <input id="nameInput" maxlength="10" autocomplete="off" autocapitalize="characters" inputmode="latin" spellcheck="false" placeholder="AAA">
  <button class="cmd ok" id="nameOk">＊ とうろく</button>
</div></div>

<button id="bgmBtn" title="BGM オン/オフ"><img src="btn-bgm.png" alt="BGM"></button>
<div id="app">

  <!-- ===== ホーム（トップ＝メニュー） ===== -->
  <section id="scHome" class="screen active">
    <img class="titleImg" src="title-logo.png" alt="Yosemite Quest">
    <div class="homeBtns">
      <button class="imgbtn" id="btnStart"><img src="btn-start.png" alt="クエストを始める"></button>
      <button class="imgbtn" id="btnRank"><img src="btn-rank.png" alt="ランキングをみる"></button>
      <button class="imgbtn" id="btnTrivia"><img src="btn-trivia.png" alt="ヨセミテ豆知識"></button>
    </div>
    <p class="footer">© Yosemite Quest</p>
  </section>

  <!-- ===== クイズ ===== -->
  <section id="scQuiz" class="screen">
    <div class="hud"><span>もんだい <b id="qNo">1</b>/20</span><span>スコア <b id="curScore">0</b></span><span>れんぞく <b id="curStreak">0</b></span></div>
    <div class="bar"><i id="qBar"></i></div>
    <div class="win" id="qWin">
      <div><span class="qcat" id="qCat"></span></div>
      <p class="qsentence" id="qSentence"></p>
      <p class="qkana"><span id="qKana"></span><button class="speak" id="btnSpeak" title="はつおん">🔊</button></p>
    </div>
    <div class="choices" id="choices"></div>
    <div class="win" id="afterWin" style="display:none">
      <div class="explain" id="explain"></div>
      <button class="cmd" id="btnNext" style="margin-top:10px">＊ つぎへ</button>
    </div>
  </section>

  <!-- ===== 結果 ===== -->
  <section id="scResult" class="screen">
    <div class="win gold center">
      <p style="font-size:15px;margin:2px" id="resWho">クエスト かんりょう！</p>
      <p class="big" id="resScore">0</p>
      <p class="rankTitle" id="resTitle"></p>
    </div>
    <div class="win">
      <div class="stat"><span>せいとうすう</span><b id="resCorrect">0 / 20</b></div>
      <div class="stat"><span>せいとうりつ</span><b id="resAcc">0%</b></div>
      <div class="stat"><span>さいだい れんぞく</span><b id="resStreak">0</b></div>
      <div class="stat"><span>じぶんの ベスト</span><b id="resBest">0</b></div>
    </div>
    <div class="win">
      <p class="center small" style="margin:2px 0 8px;color:var(--gold)">◆ 称号ランク（全8段階）◆</p>
      <div class="ladder" id="titleLadder"></div>
    </div>
    <div class="win"><p class="center" id="syncMsg" style="font-size:14px;margin:2px">ランキング はんえい ちゅう…</p></div>
    <button class="cmd" id="btnAgain">＊ もういちど</button>
    <button class="cmd" id="btnToRank">＊ ランキングを みる</button>
    <button class="cmd small" id="btnToHome">＊ トップへ もどる</button>
  </section>

  <!-- ===== ランキング ===== -->
  <section id="scRank" class="screen">
    <div class="win gold">
      <p class="center" style="font-size:20px;color:var(--gold);margin:2px">★ ランキング Top20 ★</p>
      <div class="rtabs" id="rankTabs">
        <button class="rtab" data-p="day">デイリー</button>
        <button class="rtab" data-p="week">ウィークリー</button>
        <button class="rtab on" data-p="all">総合</button>
      </div>
      <p class="notice" id="rankNet"></p>
      <div id="rankList"></div>
    </div>
    <button class="cmd small" id="btnRankRefresh">＊ さいしんに こうしん</button>
    <button class="cmd small" id="btnRankBack">＊ もどる</button>
  </section>

  <!-- ===== 豆知識 ===== -->
  <section id="scTrivia" class="screen">
    <div class="win gold">
      <p class="center" style="font-size:20px;color:var(--gold);margin:2px 0 8px">◆ ヨセミテ豆知識 ◆</p>
      <div id="triviaList"></div>
    </div>
    <button class="cmd small" id="btnTriviaBack">＊ もどる</button>
  </section>

</div>

<script src="data.js"></script>
<script>
"use strict";
/* ============================================================
   ヨセミテ英語クエスト  ―  単一ファイル / オフライン動作
   ・英文（NPS/現地の案内・解説風）の下線語/表現の意味を選ぶ
   ・目標：Yosemiteの各スポット解説・歴史説明を読破できる語彙力
   ・20問 一気通貫。途中で難易度を「非表示で」変動（易→上げる）
   ・選択肢は近い誤答（distractor）中心で 5/6/7（運正解を抑制）
   ・スコアは難易度で重み付け（総合ランキング公平化）
   ・圏外はトップ5スコアを保持→接続時にランキング反映
   ============================================================ */

/* ▼ デプロイ後にここへ GAS Web App の URL を貼る（空でもオフライン動作）*/
const RANKING_ENDPOINT = "https://script.google.com/macros/s/AKfycbwgYWVt8-43_obkJQNMju31ynpHnF1e9flp4VLxl7sgK7LZT_tBhD8NeBaRvGbeyah-mQ/exec";

const PLAYERS = ["Toshiya","Natsuko","Yume","Yuki"];

/* ---------- 問題データ（data.js から読み込み） ---------- */
const DATA = window.QUIZ_DATA || [];

/* target 展開 */
DATA.forEach(d=>{ const mm=d.s.match(/\*([^*]+)\*/); d.t = mm?mm[1]:""; });

/* 豆知識（NPS等で確認済みの事実） */
const TRIVIA = [
 "El Capitan の垂直な岩壁は 谷底から <b>約3,000ft（約900m）</b> そびえる一枚岩。",
 "Yosemite Valley は氷河の侵食でできた <b>U字型の谷</b>。もとはV字谷だった。",
 "1864年、リンカーン大統領が <b>Yosemite Grant</b> に署名。自然保護の歴史的先例。",
 "谷の先住民 <b>Ahwahneechee</b> の子孫は 今もヨセミテの歴史の一部。",
 "博物学者 <b>John Muir</b> はヨセミテの擁護者。1872年に氷河の動きを初めて測定。",
 "Bridalveil Fall は <b>懸谷(hanging valley)</b> から落ちる滝。氷河が本谷を深く削った名残。",
 "現在ヨセミテで最も活発な地質作用は <b>落石(rockfall)</b>。雨・地震・日射で起きる。",
 "Yosemite Falls の落差は <b>約739m（2,425ft）</b>。北米有数の高さ。",
 "Half Dome は標高 <b>約2,695m</b> の巨大な花崗岩ドーム。",
 "Mariposa Grove は巨木 <b>ジャイアントセコイア（Big Trees）</b> を数百本 保護。",
 "ヨセミテ最高峰は <b>Mount Lyell（13,114ft・約3,997m）</b>。",
 "El Capitan・Half Dome を撮り続けた写真家 <b>Ansel Adams</b> でも有名。"
];

/* 称号（20問アダプティブの最大 約5700点に合わせ調整） */
const TITLES = [
 {min:0,    t:"パンフレット みならい"},
 {min:900,  t:"案内板 よみかき ばん"},
 {min:1700, t:"トレイルの あんない人"},
 {min:2600, t:"レンジャー みならい"},
 {min:3500, t:"ヨセミテ 解説ハンター"},
 {min:4300, t:"花崗岩の ことば使い"},
 {min:5000, t:"ヨセミテ通訳 マスター"},
 {min:5500, t:"ヨセミテの かしこき ゆうしゃ"}
];
function titleFor(score){ let t=TITLES[0].t; for(const x of TITLES){ if(score>=x.min) t=x.t; } return t; }
/* 称号の全体位置づけ（現在ランク／次の称号まで） */
function titleInfo(score){
  let idx=0; for(let i=0;i<TITLES.length;i++){ if(score>=TITLES[i].min) idx=i; }
  const next=TITLES[idx+1]||null;
  return { idx:idx, total:TITLES.length, cur:TITLES[idx], next:next, toNext: next? (next.min-score) : 0 };
}
/* 端末内ベストの最高点（誰かが到達済みの目安。オフライン時の伏せ判定に使用） */
function localMaxScore(){ let m=0; LS.getHist().concat(LS.getPending()).forEach(function(r){ m=Math.max(m, Number(r&&r.score)||0); }); return m; }
/* 称号ラダー：maxScore 以下の称号のみ名前を表示。未到達は＊＊＊で伏せる（ワクワク用） */
function renderLadder(curIdx, maxScore){
  const box=document.getElementById("titleLadder"); if(!box) return;
  maxScore = maxScore||0;
  box.innerHTML=TITLES.map(function(x,i){
    const hi=TITLES[i+1]? (TITLES[i+1].min-1) : null;
    const range = hi!=null ? (x.min+"〜"+hi) : (x.min+"〜");
    const reached = x.min<=maxScore;
    const nm = reached ? esc(x.t) : "＊＊＊＊＊＊";
    const cls = "lrow"+(i===curIdx?" on":"")+(reached?"":" locked");
    return '<div class="'+cls+'"><span class="lno">'+(i+1)+'</span><span class="lnm">'+nm+'</span><span class="lsc">'+range+'</span></div>';
  }).join("");
}
/* 結果画面の称号表示（maxScore=記録済みの最高点。自分の今回スコアは達成済み扱い） */
function renderResultTitle(maxScore){
  const st=state; if(!st) return;
  const info=titleInfo(st.score);
  maxScore=Math.max(maxScore||0, st.score);
  const nextName = info.next ? (info.next.min<=maxScore ? esc(info.next.t) : "＊＊＊＊") : null;
  const posLine = "ランク "+(info.idx+1)+" / "+info.total
      + (info.next ? ("　次「"+nextName+"」まで あと"+info.toNext+"てん") : "　★最高ランク到達★");
  document.getElementById("resTitle").innerHTML=esc(info.cur.t)+"<small>"+posLine+"</small>";
  renderLadder(info.idx, maxScore);
}

/* 20問＝4ステップ×5問。難易度カーブ（非表示）
   ・前半(1〜10問=ステップ1,2)は全員レベル1（やさしい割合を多く）
   ・後半で「高正答(4/5以上)」の人だけが上がる：ステップ3で最大Lv2、ステップ4で最大Lv3
   ・つまり平均以下はずっとLv1、ハイスコアの人だけ どんどん難化。下げはしない
   ・レベル上限 = 入るステップに応じて 1→1→2→3（LEVEL_CAP） */
const STEP_SIZE=5;                  // 1ステップの問題数
const TOTAL_Q=20;                   // 全問題数
const ADVANCE_ACC=0.8;              // これ以上でレベルアップ（5問中4問以上＝高正答者のみ）
const CHOICE_BY_LV={1:5,2:6,3:7};
let state=null, player=null;

/* ---------- localStorage ---------- */
const LS={
  getBest:p=>+(localStorage.getItem("yq_best_"+p)||0),
  setBest:(p,v)=>localStorage.setItem("yq_best_"+p,String(v)),
  getPending:()=>{try{return JSON.parse(localStorage.getItem("yq_pending")||"[]")}catch(e){return[]}},
  setPending:a=>localStorage.setItem("yq_pending",JSON.stringify(a)),
  getHist:()=>{try{return JSON.parse(localStorage.getItem("yq_hist")||"[]")}catch(e){return[]}},   // 直近プレイ履歴（Top20/オフライン用）
  setHist:a=>localStorage.setItem("yq_hist",JSON.stringify(a))
};
/* プレイ結果を端末履歴に追加（最新60件を保持） */
function pushHist(rec){ let a=LS.getHist(); a.push({player:rec.player,score:rec.score,title:rec.title,accuracy:rec.accuracy,level:rec.level,ts:rec.ts,date:rec.date}); a=a.filter(function(x){return x&&x.player;}).slice(-60); LS.setHist(a); }
/* 期間フィルタした端末内Top（オフライン/フォールバック用） */
function localTop(period,n){
  const now=Date.now(), win = period==="day"?864e5 : period==="week"?6048e5 : null;
  let arr=LS.getHist().concat(LS.getPending().map(function(r){return {player:r.player,score:r.score,title:r.title,ts:r.ts,date:r.date,pending:true};}));
  if(win!=null) arr=arr.filter(function(r){ const t=Date.parse(r.ts); return !isNaN(t) && (now-t)<=win; });
  arr.sort(function(a,b){return (Number(b.score)||0)-(Number(a.score)||0);});
  return arr.slice(0,n||20);
}
function pushPending(rec){ let a=LS.getPending(); a.push(rec); a.sort((x,y)=>y.score-x.score); a=a.slice(0,5); LS.setPending(a); }

/* ---------- 効果音（WebAudio・冒険風） ---------- */
let AC=null;
function ac(){
  if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch(e){} }
  if(AC && AC.state==="suspended"){ AC.resume().catch(function(){}); }  // ★モバイルは要resume（正解/不正解音が鳴らない対策）
  return AC;
}
/* 最初のタップで音声をアンロック（iOS/Android対策） */
function unlockAudio(){ const c=ac(); if(c && c.state==="suspended") c.resume().catch(function(){}); if(typeof state!=="undefined" && state && localStorage.getItem("yq_bgm")!=="off") bgmForScore(state.score); }
["pointerdown","touchend","click"].forEach(function(ev){ window.addEventListener(ev, unlockAudio, {once:true}); });

/* ---------- BGM：スコア帯で3ステージ切替（出発→成長→決戦） ---------- */
const BGM_VOL=0.07;  /* 効果音を優先して控えめに */
const BGM_TRACKS=[
  {min:0,    src:"yosemite_quest_stage1_departure_48kbps.mp3"},   // 低スコア：出発
  {min:1700, src:"yosemite_quest_stage2_growth_48kbps.mp3"},      // 中スコア：成長
  {min:3500, src:"yosemite_quest_stage3_final_boss_48kbps.mp3"}   // 高スコア：決戦
];
let BGMS=null, bgmCur=-1;
function bgmInit(){ if(!BGMS){ BGMS=BGM_TRACKS.map(function(t){ const a=new Audio(t.src); a.loop=true; a.volume=BGM_VOL; a.preload="auto"; return a; }); } return BGMS; }
function bgmStageForScore(score){ let idx=0; for(let i=0;i<BGM_TRACKS.length;i++){ if(score>=BGM_TRACKS[i].min) idx=i; } return idx; }
function bgmStop(){ if(BGMS){ BGMS.forEach(function(a){ try{ a.pause(); }catch(e){} }); } bgmCur=-1; }
/* スコアに応じて適切なステージのBGMを再生（ゲーム中に呼ぶ） */
function bgmForScore(score){
  if(localStorage.getItem("yq_bgm")==="off"){ bgmStop(); return; }
  bgmInit();
  const idx=bgmStageForScore(score);
  if(idx!==bgmCur){ BGMS.forEach(function(a,i){ if(i!==idx){ try{ a.pause(); }catch(e){} } }); bgmCur=idx; }
  try{ const p=BGMS[idx].play(); if(p&&p.catch) p.catch(function(){}); }catch(e){}
}
/* 効果音を聞かせるため、再生中BGMを一時的に絞る（回答時など） */
function duckBgm(ms){
  if(!BGMS || bgmCur<0) return;
  const a=BGMS[bgmCur]; if(!a) return;
  try{
    a.volume=Math.max(0, BGM_VOL*0.22);
    clearTimeout(a._duckT);
    a._duckT=setTimeout(function(){ try{ a.volume=BGM_VOL; }catch(e){} }, ms||600);
  }catch(e){}
}
function bgmToggle(){
  const off = localStorage.getItem("yq_bgm")==="off";
  if(off){ localStorage.setItem("yq_bgm","on"); if(typeof state!=="undefined" && state) bgmForScore(state.score); }
  else{ localStorage.setItem("yq_bgm","off"); bgmStop(); }
  syncBgmBtn();
}
function syncBgmBtn(){ const b=document.getElementById("bgmBtn"); if(b) b.classList.toggle("off", localStorage.getItem("yq_bgm")==="off"); }
/* 音列を鳴らす：notes=[[freq,dur],...] */
const SFX_VOL=0.85;  /* 効果音のマスター音量（BGMより前に出す。全sfxに掛かる） */
function playSeq(notes,type="square",gain=0.07){
  const c=ac(); if(!c) return; let t=c.currentTime;
  notes.forEach(([f,dur])=>{
    if(f>0){
      const o=c.createOscillator(),g=c.createGain();
      o.type=type; o.frequency.setValueAtTime(f,t);
      o.connect(g); g.connect(c.destination);
      g.gain.setValueAtTime(gain*SFX_VOL,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur*0.95);
      o.start(t); o.stop(t+dur);
    }
    t+=dur;
  });
}
const N={C5:523,D5:587,E5:659,F5:659,G5:784,A5:880,B5:988,C6:1046,D6:1175,E6:1319,G6:1568,C4:262,E4:330,G4:392,A4:440,B3:247};
const sfxStart =()=>playSeq([[N.C5,.09],[N.E5,.09],[N.G5,.09],[N.C6,.18]],"triangle",0.08);   // 出発ファンファーレ
const sfxOk    =()=>playSeq([[N.G5,.06],[N.C6,.06],[N.E6,.12]],"square",0.07);                // 正解キラン（基本）
/* コンボ数に応じて正解音を段階的に豪華に（初めはシンプル→連続でカッコよく） */
const C7=2093,E7=2637,G7=3136;
function sfxCombo(streak){
  const s=streak||1;
  if(s<=2){                    // 1〜2：シンプルなピコッ
    playSeq([[N.C6,.05],[N.E6,.10]],"square",0.06);
  }else if(s<=4){              // 3〜4：三音アルペジオ
    playSeq([[N.G5,.05],[N.C6,.05],[N.E6,.13]],"square",0.07);
  }else if(s<=6){              // 5〜6：上昇＋きらめき
    playSeq([[N.C6,.05],[N.E6,.05],[N.G6,.14]],"square",0.075);
    playSeq([[0,.10],[E7,.10]],"triangle",0.05);
  }else if(s<=9){              // 7〜9：ファンファーレ風
    playSeq([[N.E6,.05],[N.G6,.05],[C7,.05],[E7,.16]],"square",0.08);
    playSeq([[0,.05],[N.C6,.05],[N.G6,.05],[C7,.16]],"triangle",0.05);
  }else{                        // 10連以上：最大級のキメ
    playSeq([[N.C6,.05],[N.E6,.05],[N.G6,.05],[C7,.05],[E7,.06],[G7,.20]],"square",0.085);
    playSeq([[0,.05],[N.G5,.05],[N.C6,.05],[N.E6,.05],[N.G6,.22]],"triangle",0.06);
  }
}
const sfxNg    =()=>playSeq([[N.E4,.10],[N.B3,.18]],"sawtooth",0.06);                         // 不正解ブブー
const sfxClick =()=>playSeq([[N.A4,.04]],"square",0.05);
const sfxWin   =()=>playSeq([[N.C5,.1],[N.E5,.1],[N.G5,.1],[N.C6,.1],[N.G5,.1],[N.C6,.28]],"triangle",0.08); // 勝利
const sfxRecord=()=>playSeq([[N.C6,.08],[N.E6,.08],[N.G6,.14],[N.E6,.08],[N.G6,.22]],"square",0.07);         // 新記録

function startQuest(){
  player=null;
  state={ i:0, level:1, score:0, streak:0, maxStreak:0, correct:0, used:new Set(), stepCorrect:0, q:null, answered:false };
  sfxStart(); bgmForScore(0); show("scQuiz"); nextQuestion();
}
function pickItem(level,used){
  const tryLevels=[level, level+1, level-1, level+2, level-2];
  for(const L of tryLevels){ const cand=DATA.filter(d=>d.lv===L && !used.has(d.s)); if(cand.length) return cand[Math.floor(Math.random()*cand.length)]; }
  const any=DATA.filter(d=>!used.has(d.s)); return any.length? any[Math.floor(Math.random()*any.length)] : DATA[0];
}
/* 意味が「動詞的」か（〜する/〜る 等で終わる）。選択肢の種類ミスマッチ防止に使う */
function isVerbLike(m){ const last=String(m).split(/[・\/]/).pop(); return /(する|した|される|れる|せる|る|う|く|ぐ|す|つ|ぶ|む|ぬ)$/.test(last); }
/* 選択肢：まず近い誤答(d)、足りなければ「同カテゴリ×同種類→同カテゴリ→他カテゴリ×同種類→他」で補完
   （例:法令の答えに「測量する」等 種類違いの誤答が混じるのを防ぐ） */
function buildChoices(item,n){
  const set=new Set([item.m]);
  (item.d||[]).forEach(x=>{ if(set.size<n && x!==item.m) set.add(x); });
  const wantV=isVerbLike(item.m);
  const pool=DATA.filter(d=>d.m!==item.m);
  const draw=(arr)=>{ arr=arr.slice().sort(()=>Math.random()-0.5); for(const d of arr){ if(set.size>=n)break; set.add(d.m);} };
  draw(pool.filter(d=>d.cat===item.cat && isVerbLike(d.m)===wantV));  // 同カテゴリ×同種類
  draw(pool.filter(d=>d.cat===item.cat));                            // 同カテゴリ
  draw(pool.filter(d=>isVerbLike(d.m)===wantV));                     // 他カテゴリ×同種類
  draw(pool);                                                        // 最後は何でも
  const list=[...set].slice(0,n); list.sort(()=>Math.random()-0.5); return list;
}
const CAT_LABEL={geo:"地形",spot:"名所",hist:"歴史",nat:"自然"};
function renderSentence(item){
  const cat=document.getElementById("qCat");
  cat.textContent=CAT_LABEL[item.cat]||"問題";
  cat.className="qcat "+item.cat;
  document.getElementById("qSentence").innerHTML=item.s.replace(/\*([^*]+)\*/,'<u class="tgt">$1</u>');
  document.getElementById("qKana").textContent="【"+item.t+"】"+item.kana;
  document.getElementById("btnSpeak").style.display=canSpeak?"inline":"none";
}
function nextQuestion(){
  const st=state;
  if(st.i>=20){ finish(); return; }
  st.answered=false;
  const item=pickItem(st.level,st.used); st.used.add(item.s); st.q=item;
  document.getElementById("qNo").textContent=st.i+1;
  document.getElementById("qBar").style.width=((st.i)/20*100)+"%";
  document.getElementById("curScore").textContent=st.score;
  document.getElementById("curStreak").textContent=st.streak;
  renderSentence(item);
  const n=CHOICE_BY_LV[st.level]||6;
  const box=document.getElementById("choices"); box.innerHTML="";
  document.getElementById("afterWin").style.display="none";
  document.getElementById("qWin").style.opacity="1";
  buildChoices(item,n).forEach(m=>{ const b=document.createElement("button"); b.className="choice"; b.textContent=m; b.onclick=()=>answer(b,m,item); box.appendChild(b); });
}
function answer(btn,chosen,item){
  const st=state; if(st.answered) return; st.answered=true;
  const ok=(chosen===item.m);
  document.querySelectorAll("#choices .choice").forEach(b=>{
    b.onclick=null;
    if(b.textContent===item.m){ b.classList.add("correct"); const m=document.createElement("span");m.className="mk";m.textContent="◯";b.appendChild(m);}
    else if(b===btn){ b.classList.add("wrong"); const m=document.createElement("span");m.className="mk";m.textContent="✕";b.appendChild(m);}
  });
  if(ok){ st.correct++; st.stepCorrect++; st.streak++; st.maxStreak=Math.max(st.maxStreak,st.streak);
    st.score+=st.level*100+Math.min(st.streak,5)*20; sfxCombo(st.streak); flashJudge(true);
  }else{ st.streak=0; sfxNg(); flashJudge(false); }
  document.getElementById("curScore").textContent=st.score;
  document.getElementById("curStreak").textContent=st.streak;
  bgmForScore(st.score);  // スコア帯に応じてBGMを切替（出発→成長→決戦）
  duckBgm(650);           // 回答の効果音が埋もれないようBGMを一時的に絞る
  const ex=document.getElementById("explain");
  ex.innerHTML='<span class="m">'+item.t+'</span> ＝ '+item.m+'<div class="note">'+(item.note?("💡 "+item.note+"　"):"")+'発音: '+item.kana+'</div>';
  document.getElementById("afterWin").style.display="block";
  document.getElementById("qWin").style.opacity="0.85";
  document.getElementById("afterWin").scrollIntoView({behavior:"smooth",block:"nearest"});
}
function flashJudge(ok){ const j=document.getElementById("judge"),s=document.getElementById("judgeSym"); s.textContent=ok?"◯":"✕"; s.className="sym "+(ok?"ok":"ng"); j.classList.add("show"); setTimeout(()=>j.classList.remove("show"),650); }
document.getElementById("btnSpeak").onclick=()=>{ if(state&&state.q) speak(state.q.t); };
document.getElementById("btnNext").onclick=()=>{
  const st=state; sfxClick(); st.i++;
  // ステップ境界(5問ごと)で難易度を静かに見直す。最終ステップ後は評価不要
  if(st.i % STEP_SIZE === 0 && st.i < TOTAL_Q){
    const acc = st.stepCorrect / STEP_SIZE;
    const cap = st.i / STEP_SIZE;               // 入るステップの上限Lv: step2=1, step3=2, step4=3（前半はやさしい）
    if(acc >= ADVANCE_ACC) st.level = st.level + 1;   // 高正答(4/5以上)のみ上げる
    st.level = Math.min(st.level, cap, 3);      // 前半は必ずLv1、後半も上限まで。下げはしない
    st.stepCorrect = 0;
  }
  nextQuestion();
};

      net.innerHTML="<span class='online on'></span>オンライン・最新（"+periodLabel(period)+" Top20）"; renderRank(rows); return; }catch(e){}
  }
  net.innerHTML="<span class='online'></span>オフライン表示（端末内の記録）";
  renderRank(localTop(period,20));
}
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }
/* スコア別Top20（同一プレイヤーの複数記録もそのまま並ぶ＝ハイスコアだけ残らない） */
function renderRank(rows){
  const list=document.getElementById("rankList");
  if(!rows||!rows.length){ list.innerHTML="<p class='center small'>この期間の 記録は まだ ないぞ。クエストに でよう！</p>"; return; }
  list.innerHTML="";
  rows.slice(0,20).forEach(function(r,idx){ const div=document.createElement("div"); div.className="rankrow"+(r.player===player?" me":"");
    const medal=["👑","🥈","🥉"][idx];
    const dt = r.date? '<span class="rdate">'+esc(String(r.date))+'</span>' : "";
    div.innerHTML='<div class="no">'+(medal||(idx+1))+'</div><div style="flex:1"><div class="nm">'+esc(r.player)+(r.pending?" ⏳":"")+'</div><div class="tt">'+esc(r.title||"")+' '+dt+'</div></div><div class="sc">'+(Number(r.score)||0)+'</div>';
    list.appendChild(div); });
}

  sfxClick(); show("scTrivia");
  const box=document.getElementById("triviaList");
  box.innerHTML=TRIVIA.map(t=>'<div class="trivia-card">◆ '+t+'</div>').join("");
}
document.getElementById("btnTriviaBack").onclick=()=>{ sfxClick(); show("scHome"); };

flushPending();
(function(){ const b=document.getElementById("bgmBtn"); if(b){ b.onclick=bgmToggle; } syncBgmBtn(); })();

(function(){ const t=document.getElementById("rankTabs"); if(!t) return; t.querySelectorAll(".rtab").forEach(function(b){ b.onclick=function(){ openRank(b.dataset.p); }; }); })();
